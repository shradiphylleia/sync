spring:

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

  datasource:
    url: jdbc:postgresql://localhost:5433/syncvault
    username: admin
    password: admin

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8080

syncvault:
  storage:
    endpoint: http://localhost:9000
    access-key: admin
    secret-key: password
    bucket: chunks
