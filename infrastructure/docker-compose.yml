services:

  postgres:
    image: postgres:16
    container_name: syncvault-postgres

    environment:
      POSTGRES_DB: syncvault
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: syncvault-redis

    ports:
      - "6379:6379"

    volumes:
      - redis-data:/data

  minio:
    image: minio/minio
    container_name: syncvault-minio

    command: server /data --console-address ":9001"

    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password

    ports:
      - "9000:9000"
      - "9001:9001"

    volumes:
      - minio-data:/data

volumes:
  postgres-data:
  redis-data:
  minio-data:
